services:
  smart-fruit:
    build: .
    image: smart-fruit:latest
    container_name: smart-fruit
    restart: unless-stopped
    ports:
      # Ubah "4000" di sisi kiri jika port 4000 di host sudah dipakai
      - "4000:4000"
    environment:
      - PORT=4000
    # Jika reverse proxy CasaOS (mis. Nginx Proxy Manager) sudah menangani
    # domain fruit-maturity.ijuloss.my.id dan SSL, arahkan proxy tersebut ke
    # container ini di port 4000. Tidak perlu konfigurasi SSL di sini.
