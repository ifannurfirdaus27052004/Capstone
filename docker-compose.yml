services:
  smart-relay:
    build: .
    image: smart-relay:latest
    container_name: smart-relay
    restart: unless-stopped
    ports:
      # Ubah "3000" di sisi kiri jika port 3000 di host sudah dipakai
      - "3000:3000"
    environment:
      - PORT=3000
    # Jika reverse proxy CasaOS (mis. Nginx Proxy Manager) sudah menangani
    # domain smart-relay.ijuloss.my.id dan SSL, arahkan proxy tersebut ke
    # container ini di port 3000. Tidak perlu konfigurasi SSL di sini.
